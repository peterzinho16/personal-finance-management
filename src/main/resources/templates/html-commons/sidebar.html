<th:block th:fragment="fg-sidebar (sidebarClose)">
    <aside class="sidebar"
           id="sidebar"
           th:classappend="${sidebarClose} ? '' : 'collapsed'">
        <button
                class="sb-toggle"
                id="sbToggle"
                type="button"
                aria-label="Toggle sidebar"
                th:attr="aria-expanded=${sidebarClose}">
            <i class="bi bi-chevron-left"></i>
        </button>

        <div class="sb-title">Admin Dashboard</div>
        <ul class="sb-list">
            <li class="sb-item"><a href="/resume" data-title="Resume"><i class="bi bi-journal-text"></i><span>Resume</span></a></li>

            <li class="sb-item open" id="expItem">
                <a href="javascript:void(0)" onclick="toggleSubmenu('expItem')" data-title="Expenses">
                    <i class="bi bi-wallet2"></i><span>Expenses</span>
                    <i class="bi bi-chevron-right sb-caret"></i>
                </a>
                <div class="submenu">
                    <a href="/expenditure/new">
                        <i class="bi bi-plus-circle me-2"></i> New expense
                    </a>
                    <a href="/expenditure/list">
                        <i class="bi bi-list-ul me-2"></i> List
                    </a>
                    <a href="/charts/bar-chart-categories">
                        <i class="bi bi-bar-chart-line me-2"></i> Reports
                    </a>
                </div>
            </li>

            <li class="sb-item open" id="incItem">
                <a href="javascript:void(0)" onclick="toggleSubmenu('incItem')" data-title="Incomes">
                    <i class="bi bi-coin"></i><span>Incomes</span>
                    <i class="bi bi-chevron-right sb-caret"></i>
                </a>
                <div class="submenu">
                    <a href="/income/new" data-title="Resume">
                        <i class="bi bi-plus-circle me-2"></i> New Income
                    </a>
                    <a href="/income/list">
                        <i class="bi bi-list-ul me-2"></i> List
                    </a>
                </div>
            </li>

            <li class="sb-item d-none"><a href="/categories" data-title="Categories"><i class="bi bi-folder2"></i><span>Categories</span></a></li>
            <li class="sb-item"><a href="/expenditure/list/others" data-title="Expenditure Others"><i
                    class="bi bi-card-text"></i><span>Expenditure Others</span></a></li>
        </ul>
    </aside>
</th:block>
