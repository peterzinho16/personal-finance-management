<!DOCTYPE html>
<html lang="en-us"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{html-commons/head :: fg-head(title='Login')}"></head>

<body class="bg-light">

<div class="container">
    <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 col-sm-10 col-md-6 col-lg-4">

            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <h4 class="card-title text-center mb-4">
                        Sign in
                    </h4>

                    <form th:action="@{/login}" method="post">

                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input id="username"
                                   type="text"
                                   name="username"
                                   class="form-control"
                                   th:value="${#arrays.contains(@environment.activeProfiles, 'dev') ? @environment.getProperty('app.dev.default-username') : ''}"
                                   required
                                   autofocus>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input id="password"
                                   type="password"
                                   name="password"
                                   class="form-control"
                                   th:value="${#arrays.contains(@environment.activeProfiles, 'dev') ? @environment.getProperty('app.dev.default-password') : ''}"
                                   required>
                        </div>

                        <div th:if="${param.logout}" class="alert alert-success py-2">
                            You have been logged out
                        </div>

                        <div th:if="${param.error}" class="alert alert-danger py-2">
                            Invalid username or password
                        </div>

                        <div th:if="${param.notActivated}" class="alert alert-warning py-2">
                            Your account is not activated yet. Please check your email.
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                Login
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <span class="text-muted">Don’t have an account?</span>
                        <a th:href="@{/register}" class="ms-1">Register</a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
