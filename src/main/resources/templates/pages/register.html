<!DOCTYPE html>
<html lang="en-us"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{html-commons/head :: fg-head(title='Register')}"></head>

<body class="bg-light">

<div class="container">
    <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 col-sm-10 col-md-6 col-lg-4">

            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <h4 class="card-title text-center mb-4">
                        Create account
                    </h4>

                    <form th:action="@{/register}" method="post" th:object="${registerForm}">

                        <div class="mb-3">
                            <label for="username" class="form-label">Email</label>
                            <input id="username"
                                   type="email"
                                   name="username"
                                   class="form-control"
                                   placeholder="you@example.com"
                                   required
                                   autofocus>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input id="password"
                                   type="password"
                                   name="password"
                                   class="form-control"
                                   required
                                   minlength="8">
                        </div>

                        <div th:if="${error}" class="alert alert-danger py-2">
                            <span th:text="${error}"></span>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                Create account
                            </button>
                        </div>
                    </form>
                    <!-- Registration now redirects to confirmation page -->

                    <div class="text-center mt-3">
                        <span class="text-muted">Already have an account?</span>
                        <a th:href="@{/login}" class="ms-1">Login</a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
