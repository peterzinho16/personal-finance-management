<!DOCTYPE html>
<html lang="en-us"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{html-commons/head :: fg-head(title='Check your email')}"></head>

<body class="bg-light">

<div class="container">
    <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <div class="card shadow-sm">
                <div class="card-body p-4 text-center">

                    <h4 class="mb-3">Almost there 👋</h4>

                    <p class="text-muted">
                        We’ve sent you an email with a confirmation link.
                        <br/>
                        Please check your inbox and activate your account.
                    </p>

                    <p class="text-muted small">
                        The link is valid for <strong>24 hours</strong>.
                    </p>

                    <a th:href="@{/login}" class="btn btn-outline-primary mt-3">
                        Back to login
                    </a>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
