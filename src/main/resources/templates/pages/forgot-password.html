<!DOCTYPE html>
<html lang="en-us"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{html-commons/head :: fg-head(title='Forgot Password')}"></head>

<body class="bg-light">

<div class="container">
    <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-12 col-sm-10 col-md-6 col-lg-4">

            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <h4 class="card-title text-center mb-4">
                        Reset password
                    </h4>

                    <form th:action="@{/forgot-password}" method="post">

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input id="email"
                                   type="email"
                                   name="email"
                                   class="form-control"
                                   placeholder="you@example.com"
                                   required
                                   autofocus>
                        </div>

                        <div th:if="${message}" class="alert alert-success py-2">
                            <span th:text="${message}"></span>
                        </div>

                        <div th:if="${error}" class="alert alert-danger py-2">
                            <span th:text="${error}"></span>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                Send reset link
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <span class="text-muted">Remember your password?</span>
                        <a th:href="@{/login}" class="ms-1">Login</a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
